name: Build image

# Builds and pushes an image
# Images will be tagged:
# - with "latest" if built on the main branch
# - with "<branch slug>-<run id>" if built in a PR
# - with the tag if built on tag
# - with the provided tag if dispatched manually

# Required variables:
# - REGISTRY_HOST: e.g. registry.example.com
# - REGISTRY_REPO: e.g. /org/project/kong

# Required secrets:
# - ARTIFACTORY_O28M_PUSH_USER: Container registry username
# - ARTIFACTORY_O28M_PUSH_TOKEN: Container registry password/token

on:
  pull_request:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag for this build"
        type: string
  push:
    branches:
      - main
    tags:
      - '*'

permissions:
  contents: read

jobs:
  build-push-image:
    name: Build & push
    runs-on: ubuntu-latest
    outputs:
      image-digest: ${{ steps.build-push.outputs.digest }}
      image-tag: ${{ steps.build-push.outputs.image-digest }}
    steps:
      - name: Inject slug vars
        uses: rlespinasse/github-slug-action@9e7def61550737ba68c62d34a32dd31792e3f429 #v5.5.0
      - name: Determine tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "This workflow was triggered by workflow_dispatch."
            export TAG=${{ github.event.inputs.tag }}
          else
            if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
              echo "This workflow was triggered by a tag push ${GITHUB_REF}"
              export TAG=$(echo ${GITHUB_REF} | sed 's|^refs/tags/v||')
            else
              if [[ "${GITHUB_REF_POINT_SLUG}" == "main" ]]; then
                export TAG="latest"
              else
                export TAG=${GITHUB_REF_POINT_SLUG}
              fi
            fi
          fi
          echo "Image tag will be: ${TAG}"
          echo "image-tag=${TAG}" >> "${GITHUB_OUTPUT}"
      - name: Determine image labels
        # Apply Quay expiry only to branch builds that are not main; tags stay permanent.
        id: image-labels
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "labels=" >> "${GITHUB_OUTPUT}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "labels=" >> "${GITHUB_OUTPUT}"
          else
            echo "labels=quay.expires-after=60d" >> "${GITHUB_OUTPUT}"
          fi
      - name: Login to registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 #v3.7.0
        with:
          registry: ${{ vars.REGISTRY_HOST }}
          username: ${{ secrets.ARTIFACTORY_O28M_PUSH_USER }}
          password: ${{ secrets.ARTIFACTORY_O28M_PUSH_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 #v3.7.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f #v3.12.0
      - name: Build and push
        id: build-push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 #v6.19.2
        env:
          DOCKER_BUILD_SUMMARY: false
        with:
          tags: ${{ vars.REGISTRY_HOST }}${{ vars.REGISTRY_REPO }}:${{ steps.tag.outputs.image-tag }}
          cache-from: type=registry,ref=${{ vars.REGISTRY_HOST }}${{ vars.REGISTRY_REPO }}:latest
          cache-to: type=inline
          provenance: false
          labels: ${{ steps.image-labels.outputs.labels }}
          push: true
          platforms: linux/amd64,linux/arm64
      - name: Install Cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad #v4.0.0
        with:
          cosign-release: 'v2.5.3'
      - name: Sign image using cosign
        id: cosign-sign
        run: |
          echo "TAGS=${TAGS}"
          echo "DIGEST=${DIGEST}"
          images=""
          for tag in ${TAGS}; do
            images+="${{ env.REGISTRY}}${{ env.REGISTRY_REPO }}:${tag}@${DIGEST} "
          done
          echo "images=${images}" >> $GITHUB_OUTPUT
          cosign login -u ${{ env.REGISTRY_USER }} -p ${{ env.REGISTRY_PASSWORD }} ${{ env.REGISTRY }}
          cosign sign --key env://COSIGN_PRIVATE_KEY --tlog-upload=false ${images}
        env:
          TAGS: ${{ steps.tag.outputs.image-tag }}
          DIGEST: ${{ steps.build-push.outputs.digest }}
          REGISTRY: ${{ vars.REGISTRY_HOST }}
          REGISTRY_REPO: ${{ vars.REGISTRY_REPO }}
          REGISTRY_USER: ${{ secrets.ARTIFACTORY_O28M_PUSH_USER }}
          REGISTRY_PASSWORD: ${{ secrets.ARTIFACTORY_O28M_PUSH_TOKEN }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
      - name: Verify signature
        run: |
          cosign verify --insecure-ignore-tlog=true --key env://COSIGN_PUBLIC_KEY ${IMAGES}
        env:
          IMAGES: ${{ steps.cosign-sign.outputs.images }}
          COSIGN_PUBLIC_KEY: ${{ secrets.COSIGN_PUBLIC_KEY }}

  scan-image:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    needs:
      - build-push-image
    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 #v0.35.0
        env:
          TRIVY_USERNAME: ${{ secrets.ARTIFACTORY_O28M_PUSH_USER }}
          TRIVY_PASSWORD: ${{ secrets.ARTIFACTORY_O28M_PUSH_TOKEN }}
        with:
          image-ref: "${{ vars.REGISTRY_HOST }}${{ vars.REGISTRY_REPO }}@${{ needs.build-push-image.outputs.image-digest }}"
          exit-code: "1"
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
